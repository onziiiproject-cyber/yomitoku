<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    body { margin: 0; background: #eef1f0; }
  </style>
</helmet>
<div style="width:1680px; height:945px; background:#fbfbfa; display:flex; align-items:center; justify-content:center; font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif;">
  <div style="position:relative; width:1600px; height:865px; background:#ffffff; border-radius:28px; box-shadow: 0 20px 60px rgba(20,40,38,0.08); overflow:hidden; padding:40px 48px; box-sizing:border-box; display:flex; flex-direction:column; gap:24px;">

    <div style="display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:20px;">
        <div style="width:64px; height:64px; border-radius:50%; background:#178C7E; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <path d="M3 10v4h3l5 4V6L6 10H3z" fill="#ffffff"></path>
            <path d="M15 9c1.2 1 1.2 5 0 6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"></path>
            <path d="M17.5 6.5c2.2 2 2.2 9 0 11" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"></path>
          </svg>
        </div>
        <div style="font-size:38px; font-weight:800; color:#1a1a1a;">今週の通知一覧（1/2）</div>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <svg width="40" height="40" viewBox="0 0 56 56">
          <polygon points="28,4 44,4 30,26 30,52 22,52 22,26" fill="#178C7E"></polygon>
          <line x1="10" y1="36" x2="46" y2="36" stroke="#178C7E" stroke-width="4"></line>
          <line x1="10" y1="46" x2="46" y2="46" stroke="#178C7E" stroke-width="4"></line>
        </svg>
        <div style="display:flex; flex-direction:column; gap:2px;">
          <div style="font-size:22px; font-weight:800; color:#1a1a1a;">ヨミトク</div>
          <div style="font-size:12px; font-weight:600; color:#3a3a3a; letter-spacing:0.1em;">介護保険最新情報</div>
        </div>
      </div>
    </div>

    <sc-for list="{{ notices }}" as="notice" hint-placeholder-count="3">
      <div style="display:flex; gap:28px; align-items:stretch; border:1.5px solid #e3e8e7; border-radius:20px; padding:26px 32px;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px; width:150px; flex-shrink:0;">
          <div style="width:96px; height:96px; border-radius:20px; background:#e8f4f2; display:flex; align-items:center; justify-content:center;">
            <sc-if value="{{ notice.isChart }}" hint-placeholder-val="{{ true }}">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                <rect x="4" y="3" width="16" height="18" rx="2" stroke="#178C7E" stroke-width="2"></rect>
                <path d="M8 16v-3M12 16V9M16 16v-5" stroke="#178C7E" stroke-width="2" stroke-linecap="round"></path>
              </svg>
            </sc-if>
            <sc-if value="{{ notice.isShield }}" hint-placeholder-val="{{ false }}">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                <path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z" fill="#178C7E"></path>
                <line x1="12" y1="8" x2="12" y2="13" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></line>
                <circle cx="12" cy="16" r="1.3" fill="#ffffff"></circle>
              </svg>
            </sc-if>
            <sc-if value="{{ notice.isScale }}" hint-placeholder-val="{{ false }}">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                <line x1="12" y1="3" x2="12" y2="19" stroke="#178C7E" stroke-width="2"></line>
                <line x1="5" y1="6" x2="19" y2="6" stroke="#178C7E" stroke-width="2"></line>
                <path d="M5 6l-3 6a3 3 0 0 0 6 0l-3-6z" stroke="#178C7E" stroke-width="2" fill="none"></path>
                <path d="M19 6l-3 6a3 3 0 0 0 6 0l-3-6z" stroke="#178C7E" stroke-width="2" fill="none"></path>
                <line x1="8" y1="19" x2="16" y2="19" stroke="#178C7E" stroke-width="2" stroke-linecap="round"></line>
              </svg>
            </sc-if>
          </div>
          <div style="background:#e8f4f2; color:#178C7E; font-size:15px; font-weight:700; border-radius:999px; padding:8px 18px; text-align:center; white-space:nowrap;">{{ notice.tag }}</div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:space-between; flex:1; min-width:0;">
          <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
            <div style="font-size:26px; font-weight:800; color:#1a1a1a;">{{ notice.title }}</div>
            <div style="background:{{ notice.badgeBg }}; color:{{ notice.badgeColor }}; font-size:16px; font-weight:700; border-radius:8px; padding:4px 14px;">{{ notice.badgeLabel }}</div>
          </div>
          <div style="font-size:18px; color:#4a4a4a; line-height:1.7; margin-top:10px;">
            {{ notice.descLine1 }}<br/>
            {{ notice.descLine2 }}
          </div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-top:14px;">
            <div style="display:flex; align-items:center; gap:28px;">
              <div style="display:flex; align-items:center; gap:8px; color:#178C7E; font-size:17px; font-weight:600;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="#178C7E" stroke-width="2"></rect><line x1="8" y1="8" x2="16" y2="8" stroke="#178C7E" stroke-width="2"></line><line x1="8" y1="12" x2="16" y2="12" stroke="#178C7E" stroke-width="2"></line></svg>
                {{ notice.vol }}
              </div>
              <div style="display:flex; align-items:center; gap:8px; color:#178C7E; font-size:17px; font-weight:600;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="3" stroke="#178C7E" stroke-width="2"></rect><line x1="3" y1="10" x2="21" y2="10" stroke="#178C7E" stroke-width="2"></line></svg>
                {{ notice.date }}
              </div>
            </div>
            <div style="color:#178C7E; font-size:18px; font-weight:700; text-decoration:underline;">資料PDFを見る →</div>
          </div>
        </div>
      </div>
    </sc-for>

    <div style="display:flex; align-items:center; gap:14px; background:#f4f7f6; border-radius:16px; padding:16px 24px; margin-top:auto;">
      <div style="width:22px; height:22px; border-radius:50%; border:2px solid #178C7E; color:#178C7E; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;">i</div>
      <div style="font-size:15px; color:#666666;">※ 厚生労働省「介護保険最新情報」ページをもとにした自動要約です。正式な内容は原文でご確認ください。</div>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const notices = [
      {
        isChart: true, isShield: false, isScale: false,
        tag: '調査・データ提供依頼',
        title: '令和8年度 介護従事者処遇状況等調査への協力依頼（7月実施）',
        badgeLabel: '重要',
        badgeBg: '#fde7e7',
        badgeColor: '#d64545',
        descLine1: '介護職員の給与や処遇改善加算の効果を調べる調査が7月に実施されます。',
        descLine2: '次期報酬改定の基礎資料になる重要な調査で、調査票は7月下旬に届きます。',
        vol: 'vol.1507',
        date: '令和8年6月1日',
      },
      {
        isChart: false, isShield: true, isScale: false,
        tag: '安全・事故防止',
        title: '訪問系サービス従事者の安全確保の徹底について',
        badgeLabel: '重要',
        badgeBg: '#fde7e7',
        badgeColor: '#d64545',
        descLine1: '介護支援専門員が被害に遭った事件を受け、暴力・嫌がらせへの組織的な対応体制の整備や、',
        descLine2: '複数名訪問への費用支援の活用が呼びかけられています。',
        vol: 'vol.1508',
        date: '令和8年6月3日',
      },
      {
        isChart: false, isShield: false, isScale: true,
        tag: '制度改正',
        title: '職員確保のための補助金、都道府県から交付可能に',
        badgeLabel: '注目',
        badgeBg: '#fdf0dc',
        badgeColor: '#c9822a',
        descLine1: '介護保険法の改正により、都道府県が介護事業者の職員確保を支援する補助金を',
        descLine2: '交付できるようになりました。国保連への事務委託も可能です。',
        vol: 'vol.1509',
        date: '令和8年6月3日',
      },
    ];
    return { notices };
  }
}
</script>
</body>
</html>
